<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - CBG 人力驾驶舱</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>
  <style>
    body { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
  <div class="bg-gray-800 rounded-xl shadow-2xl p-8 w-full max-w-md border border-gray-700">
    <h1 class="text-2xl font-bold text-white text-center mb-2">CBG 人力驾驶舱</h1>
    <p class="text-gray-400 text-center mb-8">请登录以访问仪表盘</p>
    
    <form id="login-form" class="space-y-4">
      <div>
        <label class="block text-sm text-gray-300 mb-1">邮箱</label>
        <input 
          type="email" 
          id="email" 
          required
          class="w-full px-4 py-3 bg-gray-700 text-white rounded-lg border border-gray-600 focus:border-blue-500 focus:outline-none"
          placeholder="your@email.com"
        >
      </div>
      <div>
        <label class="block text-sm text-gray-300 mb-1">密码</label>
        <input 
          type="password" 
          id="password" 
          required
          class="w-full px-4 py-3 bg-gray-700 text-white rounded-lg border border-gray-600 focus:border-blue-500 focus:outline-none"
          placeholder="••••••••"
        >
      </div>
      <button 
        type="submit"
        id="login-btn"
        class="w-full py-3 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-lg transition"
      >
        登录
      </button>
    </form>
    
    <p id="error-msg" class="text-red-400 text-sm text-center mt-4 hidden"></p>
    <p id="loading-msg" class="text-gray-400 text-sm text-center mt-4 hidden">登录中...</p>
  </div>

  <script>
    // Supabase 配置
    const SUPABASE_URL = 'https://ccdgebymatqddpsvhpny.supabase.co'
    const SUPABASE_ANON_KEY = 'sb_publishable_9O0vOLRwrFxY5zMhyevvLA_kRgi8BYX'
    
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
    
    // 检查是否已登录
    async function checkAuth() {
      const { data: { user } } = await supabase.auth.getUser()
      if (user) {
        window.location.href = '/dashboard-supabase.html'
      }
    }
    checkAuth()
    
    // 登录表单
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault()
      
      const email = document.getElementById('email').value
      const password = document.getElementById('password').value
      const loginBtn = document.getElementById('login-btn')
      const errorMsg = document.getElementById('error-msg')
      const loadingMsg = document.getElementById('loading-msg')
      
      loginBtn.disabled = true
      loginBtn.textContent = '登录中...'
      errorMsg.classList.add('hidden')
      loadingMsg.classList.remove('hidden')
      
      try {
        const { data, error } = await supabase.auth.signInWithPassword({
          email,
          password
        })
        
        if (error) {
          throw error
        }
        
        if (data.user) {
          window.location.href = '/dashboard-supabase.html'
        }
      } catch (error) {
        errorMsg.textContent = error.message === 'Invalid login credentials' 
          ? '邮箱或密码错误' 
          : error.message
        errorMsg.classList.remove('hidden')
        loadingMsg.classList.add('hidden')
      } finally {
        loginBtn.disabled = false
        loginBtn.textContent = '登录'
      }
    })
  </script>
</body>
</html>
